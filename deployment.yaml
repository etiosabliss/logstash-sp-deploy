apiVersion: apps/v1
kind: Deployment
metadata:
  name: qis-synapse-check
  namespace: logstash
  labels:
    app.kubernetes.io/name: logstash
    app.kubernetes.io/component: qis-synapse-check
  annotations:
    kubernetes.io/description: "Daily QIS-Synapse stale-link check (ENTIT-89 / WA2606 147). Logs into Synapse as the SP-ELK-ALG-SQLMON service principal, runs one check query at 06:00, writes results to Elastic; an Elastic rule alerts on rows."
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: logstash
      app.kubernetes.io/component: qis-synapse-check
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logstash
        app.kubernetes.io/component: qis-synapse-check
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: logstash-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: logstash
          image: acrlogstashlab18328.azurecr.io/logstash-sp:9.4.3-1
          imagePullPolicy: Always
          ports:
            - name: monitoring
              containerPort: 9600
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 60
            periodSeconds: 15
          env:
            - name: SYNAPSE_USER
              valueFrom:
                secretKeyRef: { name: qis-synapse-sp, key: client-id }
            - name: SYNAPSE_PASSWORD
              valueFrom:
                secretKeyRef: { name: qis-synapse-sp, key: client-secret }
            - name: ES_CLOUD_ID
              valueFrom:
                secretKeyRef: { name: es-playground, key: cloud-id }
            - name: ES_API_KEY
              valueFrom:
                secretKeyRef: { name: es-playground, key: api-key }
          volumeMounts:
            - { name: config, mountPath: /usr/share/logstash/config/logstash.yml, subPath: logstash.yml, readOnly: true }
            - { name: data, mountPath: /usr/share/logstash/data }
            - { name: tmp, mountPath: /tmp }
            - { name: kv, mountPath: /mnt/kv, readOnly: true }
      volumes:
        - name: config
          configMap: { name: qis-synapse-check-config }
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: kv
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes: { secretProviderClass: "qis-kv" }
